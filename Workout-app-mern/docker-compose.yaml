services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    networks:
      - zenu-network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - zenu-network

  mongodb:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - zenu-network

volumes:
  mongo_data:

networks:
  zenu-network:
    driver: bridge